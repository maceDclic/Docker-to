<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestionnaire de Tâches Dynamique</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Gestionnaire de Tâches</h1>
    <p>Visualisez votre journée en un coup d’œil.</p>
  </header>

  <!-- Formulaire de création -->
  <section class="task-form">
    <h2>Ajouter une tâche</h2>

    <form id="taskForm">
      <div class="field">
        <label for="titre">Titre</label>
        <input type="text" id="titre" name="titre" required placeholder="Réunion de chantier" />
      </div>

      <div class="field-row">
        <div class="field">
          <label for="heure_debut">Début</label>
          <input type="time" id="heure_debut" name="heure_debut" required />
        </div>

        <div class="field">
          <label for="heure_fin">Fin</label>
          <input type="time" id="heure_fin" name="heure_fin" required />
        </div>
      </div>

      <div class="field">
        <label for="statut">Statut</label>
        <select id="statut" name="statut" required>
          <option value="À venir">🔵 À venir</option>
          <option value="En cours">🟠 En cours</option>
          <option value="Terminée">🟢 Terminée</option>
        </select>
      </div>

      <button type="submit">Ajouter la tâche</button>
    </form>

    <div id="formMessage" class="form-message" aria-live="polite"></div>
  </section>

  <!-- Liste des tâches -->
  <section class="task-list">
    <h2>Agenda du jour</h2>
    <div id="tasksContainer" class="tasks-container">
      <!-- Les cartes tâches seront injectées ici -->
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
